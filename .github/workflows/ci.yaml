name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - run: npm install
      - run: npm run build

      - name: Slack Build Started
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"🟡 Build Started for main branch..."}' \
          ${{ secrets.VLE3_WEBHOOK_SLACK }}

      - name: Slack Success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"✅ Build Successful 🚀"}' \
          ${{ secrets.VLE3_WEBHOOK_SLACK }}

      - name: Slack Failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"❌ Build Failed 🚨"}' \
          ${{ secrets.VLE3_WEBHOOK_SLACK }}